<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Logbook v2 — Biro PnD IKPIA Perbanas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy:#0d2b4e; --navy-mid:#1a4a7a; --navy-lt:#e6eef7;
    --gold:#c8a84b; --gold-lt:#fdf6e3;
    --hijau:#1a6b4a; --hijau-lt:#d4f0e5; --hijau-br:#22a06b;
    --abu:#6b7280; --abu-lt:#f4f6f8; --abu-br:#d1d9e0;
    --kuning:#d97706; --kuning-lt:#fef3c7;
    --merah:#c0392b; --merah-lt:#fee2e2;
    --ungu:#6d28d9; --ungu-lt:#ede9fe;
    --putih:#ffffff; --teks:#1a2433; --teks-sub:#5a6678;
    --radius:12px; --shadow:0 4px 24px rgba(13,43,78,.10);
  }
  html { scroll-behavior:smooth; }
  body {
    font-family:'Plus Jakarta Sans', system-ui, sans-serif;
    background:var(--abu-lt); color:var(--teks);
    min-height:100vh; line-height:1.6;
  }

  /* ── LOGIN ── */
  #login-screen {
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(160deg, var(--navy) 0%, #0a2240 40%, #1a3a5c 100%);
    padding:20px;
  }
  .login-card {
    background:var(--putih); border-radius:20px; padding:48px 40px;
    width:100%; max-width:420px;
    box-shadow:0 32px 80px rgba(0,0,0,.28);
    text-align:center; border-top:5px solid var(--gold);
  }
  .login-logo-wrap { margin:0 auto 16px; display:flex; justify-content:center; }
  .login-logo-wrap img { height:84px; width:auto; object-fit:contain; }
  .login-card h1 { font-size:21px; font-weight:700; color:var(--navy); margin-bottom:4px; }
  .login-card .login-sub { font-size:13px; color:var(--teks-sub); }
  .login-card .login-ver { font-size:11px; color:var(--gold); font-weight:700; letter-spacing:.5px; margin-top:4px; }
  .login-divider { width:48px; height:3px; background:var(--gold); margin:14px auto 26px; border-radius:2px; }
  .pin-label { font-size:11px; font-weight:700; color:var(--teks-sub); text-align:left; margin-bottom:8px; text-transform:uppercase; letter-spacing:1px; }
  .pin-input {
    width:100%; padding:16px 18px; border:2px solid var(--abu-br); border-radius:10px;
    font-size:24px; letter-spacing:8px; text-align:center; color:var(--navy); font-weight:700;
    outline:none; transition:border-color .2s; margin-bottom:14px; font-family:inherit;
  }
  .pin-input:focus { border-color:var(--navy-mid); box-shadow:0 0 0 3px rgba(26,74,122,.12); }
  .pin-input.error { border-color:var(--merah); animation:shake .3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
  .btn-login {
    width:100%; padding:14px; background:linear-gradient(135deg, var(--navy-mid), var(--navy));
    color:white; border:none; border-radius:10px;
    font-family:inherit; font-size:14px; font-weight:700;
    cursor:pointer; transition:opacity .2s, transform .1s;
    letter-spacing:.5px; text-transform:uppercase;
  }
  .btn-login:hover { opacity:.88; }
  .btn-login:active { transform:scale(.98); }
  .btn-login:disabled { opacity:.5; cursor:not-allowed; }
  .error-msg { font-size:12px; color:var(--merah); margin-top:8px; min-height:18px; font-weight:600; }
  .login-help { font-size:11px; color:var(--teks-sub); margin-top:18px; line-height:1.5; }

  /* ── APP ── */
  #app-screen { display:none; }
  .header {
    background:linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    color:white; padding:0 28px; position:sticky; top:0; z-index:100;
    box-shadow:0 3px 16px rgba(13,43,78,.22); border-bottom:3px solid var(--gold);
  }
  .header-inner { display:flex; align-items:center; justify-content:space-between; height:64px; gap:20px; }
  .header-brand { display:flex; align-items:center; gap:14px; }
  .header-logo-wrap img { height:40px; width:auto; object-fit:contain; display:block; }
  .header-divider { width:1px; height:34px; background:rgba(255,255,255,.25); }
  .header-title { font-size:16px; font-weight:700; color:white; line-height:1.2; }
  .header-sub { font-size:10px; color:rgba(255,255,255,.7); margin-top:2px; letter-spacing:.3px; text-transform:uppercase; }
  .header-right { display:flex; align-items:center; gap:14px; }
  .header-date { font-size:12px; color:rgba(255,255,255,.85); font-weight:600; white-space:nowrap;
    background:rgba(255,255,255,.10); padding:6px 12px; border-radius:18px; border:1px solid rgba(255,255,255,.15); }
  .header-user { display:flex; align-items:center; gap:10px; padding:6px 12px; background:rgba(255,255,255,.10); border-radius:24px; border:1px solid rgba(255,255,255,.15); cursor:pointer; }
  .header-user-av { width:28px; height:28px; border-radius:50%; background:var(--gold); color:var(--navy); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:11px; }
  .header-user-info { font-size:11px; color:white; line-height:1.2; }
  .header-user-info .name { font-weight:700; }
  .header-user-info .role { color:rgba(255,255,255,.7); font-size:10px; text-transform:uppercase; }
  .btn-logout { background:none; border:1px solid rgba(255,255,255,.25); color:white; font-family:inherit; font-size:11px; padding:6px 12px; border-radius:18px; cursor:pointer; font-weight:600; }
  .btn-logout:hover { background:rgba(255,255,255,.15); }

  /* NAV */
  .nav { background:var(--putih); border-bottom:2px solid var(--abu-br); display:flex; padding:0 28px; gap:0; box-shadow:0 2px 8px rgba(0,0,0,.05); overflow-x:auto; }
  .nav-tab {
    font-family:inherit; font-size:12px; font-weight:700; color:var(--teks-sub);
    background:none; border:none; padding:14px 20px; cursor:pointer;
    border-bottom:3px solid transparent; margin-bottom:-2px;
    transition:color .2s, border-color .2s; text-transform:uppercase; letter-spacing:.4px;
    white-space:nowrap;
  }
  .nav-tab:hover { color:var(--navy); }
  .nav-tab.active { color:var(--navy); border-bottom-color:var(--gold); }
  .nav-tab[hidden] { display:none; }

  /* MAIN */
  .main { max-width:1240px; margin:0 auto; padding:28px 24px 60px; }

  /* ── COMPONENTS ── */
  .alert { font-size:13px; font-weight:600; padding:12px 18px; border-radius:10px; margin-bottom:20px; border-left:4px solid; }
  .alert-warn { background:#fef9e7; color:#92400e; border-left-color:var(--kuning); }
  .alert-ok   { background:var(--hijau-lt); color:var(--hijau); border-left-color:var(--hijau-br); }
  .alert-info { background:var(--navy-lt); color:var(--navy); border-left-color:var(--navy-mid); }

  .toolbar { background:var(--putih); padding:14px 18px; border-radius:10px; box-shadow:var(--shadow); margin-bottom:20px; display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  .toolbar label { font-size:11px; font-weight:700; color:var(--teks-sub); text-transform:uppercase; letter-spacing:.4px; margin-right:4px; }
  .toolbar input, .toolbar select { font-family:inherit; font-size:13px; padding:8px 12px; border:1px solid var(--abu-br); border-radius:8px; outline:none; color:var(--teks); background:white; }
  .toolbar input:focus, .toolbar select:focus { border-color:var(--navy-mid); }
  .toolbar input[type="date"] { min-width:140px; }
  .toolbar input[type="search"] { min-width:180px; }
  .toolbar .spacer { flex:1; }

  .btn { font-family:inherit; font-size:12px; font-weight:700; padding:8px 14px; border-radius:8px; cursor:pointer; border:none; transition:opacity .2s, transform .1s; text-transform:uppercase; letter-spacing:.4px; white-space:nowrap; }
  .btn-primary  { background:var(--navy-mid); color:white; }
  .btn-primary:hover { opacity:.88; }
  .btn-gold     { background:var(--gold); color:var(--navy); }
  .btn-gold:hover { opacity:.88; }
  .btn-outline  { background:white; color:var(--navy); border:1px solid var(--abu-br); }
  .btn-outline:hover { border-color:var(--navy-mid); }
  .btn-ghost    { background:transparent; color:var(--teks-sub); }
  .btn-ghost:hover { color:var(--navy); background:var(--abu-lt); }

  .cards { display:grid; gap:16px; margin-bottom:24px; }
  .cards-4 { grid-template-columns:repeat(4, 1fr); }
  .cards-3 { grid-template-columns:repeat(3, 1fr); }
  .cards-2 { grid-template-columns:repeat(2, 1fr); }
  .card { background:var(--putih); border-radius:var(--radius); padding:22px 20px 18px; box-shadow:var(--shadow); border-top:4px solid var(--card-accent, var(--navy-mid)); position:relative; overflow:hidden; }
  .card::after { content:''; position:absolute; bottom:0; right:0; width:60px; height:60px; background:var(--card-accent, var(--navy-mid)); opacity:.05; border-radius:50% 0 0 0; }
  .card-label { font-size:11px; font-weight:700; color:var(--teks-sub); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
  .card-val { font-size:38px; font-weight:800; color:var(--navy); line-height:1; }
  .card-sub { font-size:11px; color:var(--teks-sub); margin-top:8px; font-weight:500; }
  .card-mini { padding:16px; }
  .card-mini .card-val { font-size:28px; }

  .panel { background:var(--putih); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow); margin-bottom:20px; }
  .panel-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
  .panel-title { font-size:14px; font-weight:700; color:var(--navy); text-transform:uppercase; letter-spacing:.5px; }
  .panel-sub   { font-size:11px; color:var(--teks-sub); margin-top:2px; }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { text-align:left; padding:12px 14px; background:var(--abu-lt); color:var(--teks-sub); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; border-bottom:2px solid var(--abu-br); position:sticky; top:0; }
  tbody td { padding:12px 14px; border-bottom:1px solid var(--abu-br); color:var(--teks); }
  tbody tr:hover { background:var(--abu-lt); }
  tbody tr.row-click { cursor:pointer; }
  .table-wrap { overflow-x:auto; }
  .empty { text-align:center; padding:36px 16px; color:var(--teks-sub); font-size:13px; }

  .badge { display:inline-block; padding:3px 10px; border-radius:10px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.3px; }
  .b-ok   { background:var(--hijau-lt); color:var(--hijau); }
  .b-warn { background:var(--kuning-lt); color:var(--kuning); }
  .b-bad  { background:var(--merah-lt); color:var(--merah); }
  .b-info { background:var(--navy-lt); color:var(--navy); }
  .b-mut  { background:var(--abu-lt); color:var(--teks-sub); }

  .av { width:36px; height:36px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:12px; flex-shrink:0; }
  .av-kabiro { background:var(--navy-mid); }
  .av-kabag  { background:var(--hijau); }
  .av-staf   { background:var(--abu); }

  .nama-cell { display:flex; align-items:center; gap:10px; }
  .nama-cell .nm { font-weight:600; color:var(--teks); line-height:1.2; }
  .nama-cell .jb { font-size:11px; color:var(--teks-sub); margin-top:2px; }

  .progress { height:8px; background:var(--abu-lt); border-radius:4px; overflow:hidden; }
  .progress-bar { height:100%; transition:width .4s; }
  .pb-ok   { background:var(--hijau-br); }
  .pb-warn { background:var(--kuning); }
  .pb-bad  { background:var(--merah); }

  /* Donut chart pie via conic-gradient */
  .donut { width:140px; height:140px; border-radius:50%; position:relative; margin:0 auto; }
  .donut::after { content:''; position:absolute; inset:18px; background:white; border-radius:50%; }
  .donut-label { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:1; text-align:center; }
  .donut-val { font-size:24px; font-weight:800; color:var(--navy); line-height:1; }
  .donut-cap { font-size:10px; color:var(--teks-sub); text-transform:uppercase; letter-spacing:.5px; margin-top:4px; }

  .legend { display:flex; flex-direction:column; gap:6px; }
  .legend-item { display:flex; align-items:center; gap:8px; font-size:12px; }
  .legend-dot { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
  .legend-name { flex:1; color:var(--teks); }
  .legend-val { color:var(--teks-sub); font-weight:600; }

  /* Bar chart (CSS only) */
  .bars { display:flex; gap:4px; height:140px; align-items:flex-end; padding:8px 0; border-bottom:1px solid var(--abu-br); }
  .bars .bar-col { flex:1; display:flex; flex-direction:column; justify-content:flex-end; gap:1px; min-width:8px; }
  .bars .seg { width:100%; }
  .bars .seg-bad  { background:var(--merah); }
  .bars .seg-warn { background:var(--kuning); }
  .bars .seg-ok   { background:var(--hijau-br); }
  .bars-label { display:flex; gap:4px; margin-top:4px; font-size:9px; color:var(--teks-sub); }
  .bars-label > span { flex:1; text-align:center; min-width:8px; }

  /* Stat tile (per personil card) */
  .stat-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
  .stat-tile { background:white; border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); border-left:4px solid var(--gold); }
  .stat-tile-head { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .stat-tile-meta { font-size:11px; color:var(--teks-sub); }
  .stat-tile-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:8px 14px; margin-bottom:12px; }
  .stat-mini { font-size:11px; color:var(--teks-sub); text-transform:uppercase; letter-spacing:.4px; }
  .stat-mini-val { font-size:18px; font-weight:700; color:var(--navy); }
  .stat-pct { display:flex; justify-content:space-between; align-items:center; margin-bottom:4px; font-size:12px; }
  .stat-pct-val { font-weight:700; }

  /* Detail */
  .detail-back { font-size:13px; color:var(--navy-mid); cursor:pointer; font-weight:600; display:inline-flex; gap:6px; align-items:center; margin-bottom:12px; }
  .detail-back:hover { color:var(--navy); }
  .detail-head { display:flex; align-items:center; gap:14px; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid var(--abu-br); }
  .detail-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:14px; }
  .detail-item { background:var(--abu-lt); padding:12px 14px; border-radius:8px; }
  .detail-item.full { grid-column:1 / -1; }
  .detail-item .lbl { font-size:10px; color:var(--teks-sub); text-transform:uppercase; letter-spacing:.5px; font-weight:700; margin-bottom:4px; }
  .detail-item .val { font-size:13px; color:var(--teks); white-space:pre-wrap; word-break:break-word; }

  .gform-cta { display:inline-flex; align-items:center; gap:8px; background:var(--gold); color:var(--navy); padding:10px 18px; border-radius:8px; font-weight:700; text-decoration:none; font-size:13px; }
  .gform-cta:hover { opacity:.9; }

  /* Loader */
  .loading { text-align:center; padding:40px; color:var(--teks-sub); font-size:13px; }
  .spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--abu-br); border-top-color:var(--navy-mid); border-radius:50%; animation:spin 1s linear infinite; vertical-align:middle; margin-right:8px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Print */
  @media print {
    .header, .nav, .toolbar, .btn, .gform-cta { display:none !important; }
    .main { padding:0; max-width:100%; }
    .panel, .card { box-shadow:none; border:1px solid var(--abu-br); page-break-inside:avoid; }
    body { background:white; }
  }

  /* Responsive */
  @media (max-width:900px) {
    .cards-4 { grid-template-columns:repeat(2, 1fr); }
    .cards-3 { grid-template-columns:repeat(2, 1fr); }
    .header { padding:0 16px; }
    .main { padding:20px 14px 40px; }
    .nav { padding:0 16px; }
    .nav-tab { padding:12px 14px; font-size:11px; }
    .header-title { font-size:14px; }
    .header-date, .header-user-info { display:none; }
  }
</style>
</head>

  .replace(/"/g,'&quot;').replace(/'/g,'&#39;');

function inisial(nama){ return String(nama||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase(); }
function avClass(role){
  if (!role) return 'av-staf';
  const r = role.toLowerCase();
  if (r.includes('biro') || r === 'kabiro') return 'av-kabiro';
  if (r.includes('kabag')) return 'av-kabag';
  return 'av-staf';
}
function tglPanjang(d){
  if (!d) return '—';
  const HARI=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const BLN =['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const x = new Date(d + (d.length===10 ? 'T00:00:00' : ''));
  return `${HARI[x.getDay()]}, ${x.getDate()} ${BLN[x.getMonth()]} ${x.getFullYear()}`;
}
function tglPendek(d){
  if (!d) return '—';
  const B=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const H=['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  const x=new Date(d + (d.length===10 ? 'T00:00:00' : ''));
  return `${H[x.getDay()]} ${x.getDate()} ${B[x.getMonth()]}`;
}
function ymdHariIni(){ return new Date().toISOString().slice(0,10); }
function ymdAwalBulan(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`; }
function pctColor(p){ return p >= 90 ? 'pb-ok' : p >= 70 ? 'pb-warn' : 'pb-bad'; }
function badgeStatus(s){
  if (s === 'Submit')         return '<span class="badge b-ok">Tepat Waktu</span>';
  if (s === 'Terlambat')      return '<span class="badge b-warn">Terlambat</span>';
  if (s === 'Tidak Submit')   return '<span class="badge b-bad">Tidak Submit</span>';
  return `<span class="badge b-mut">${escHtml(s)}</span>`;
}

// API fetch via Vercel proxy
async function fetchApi(action, extra){
  const query = new URLSearchParams({
    mode: 'api',
    action: action,
    ...(extra || {})
  });

  const url = `/api/gas?${query.toString()}`;
  console.info('[Logbook PnD] Request via Vercel proxy:', url);

  const response = await fetch(url, {
    method: 'GET',
    cache: 'no-store',
  });

  const text = await response.text();

  if (!response.ok) {
    throw new Error(`Proxy error ${response.status}: ${text}`);
  }

  try {
    return JSON.parse(text);
  } catch (err) {
    console.error('[Logbook PnD] Response bukan JSON:', text);
    throw new Error('Response server bukan JSON valid.');
  }
}

function setHeaderDate(){
  const d=new Date(); const HARI=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const BLN=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  $('#header-date').textContent = `${HARI[d.getDay()]}, ${d.getDate()} ${BLN[d.getMonth()]} ${d.getFullYear()}`;
}

async function doLogin(){
  const inp = $('#pin-input');
  const btn = $('#btn-login');
  const err = $('#login-err');
  const pin = String(inp.value || '').trim();

  err.textContent = '';
  inp.classList.remove('error');

  if (!/^\d{6}$/.test(pin)) {
    err.textContent = 'PIN harus 6 digit angka.';
    inp.classList.add('error');
    inp.focus();
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Memverifikasi…';

  try {
    const res = await fetchApi('auth_pin', { pin });

    if (!res || res.ok !== true) {
      err.textContent = (res && res.error) ? res.error : 'PIN tidak dikenali.';
      inp.classList.add('error');
      inp.focus();
      return;
    }

    if (!res.user || !res.user.role) {
      err.textContent = 'Login berhasil, tetapi data user dari server tidak lengkap.';
      inp.classList.add('error');
      return;
    }

    state.user = res.user;
    sessionStorage.setItem('lb_user', JSON.stringify(res.user));
    initApp();
  } catch (e) {
    console.error('Login error:', e);
    err.textContent = 'Tidak bisa terhubung ke server. Cek Console/Network: endpoint Apps Script harus aktif, akses = Anyone, dan response callback JSONP harus muncul.';
    inp.classList.add('error');
    inp.focus();
  } finally {
    btn.disabled = false;
    btn.textContent = 'Masuk';
  }
}

function doLogout(){
  sessionStorage.removeItem('lb_user');
  state.user = null;
  state.cache = {};
  location.reload();
}

function initApp(){
  $('#login-screen').style.display = 'none';
  $('#app-screen').style.display   = 'block';
  setHeaderDate();
  // header user
  const u = state.user;
  $('#user-av').textContent   = inisial(u.nama);
  $('#user-av').className     = 'header-user-av';
  $('#user-name').textContent = u.nama.split(',')[0];
  $('#user-role').textContent = u.jabatan;

  // role-based tab visibility
  const visible = tabsForRole(u.role);
  document.querySelectorAll('.nav-tab').forEach(b => {
    b.hidden = !visible.includes(b.dataset.tab);
  });

  // default filter range = bulan berjalan
  state.filter.start = ymdAwalBulan();
  state.filter.end   = ymdHariIni();

  // tab default
  const startTab = visible[0] || 'hari_ini';
  const startBtn = document.querySelector(`.nav-tab[data-tab="${startTab}"]`);
  showTab(startTab, startBtn);
}

function tabsForRole(role){
  const r = (role || '').toLowerCase();
  if (r === 'staf') {
    return ['hari_ini', 'logbook_saya', 'beban', 'history'];
  }
  if (r === 'kabag') {
    return ['hari_ini', 'logbook_saya', 'beban', 'history', 'statistik', 'kendala'];
  }
  // kabiro
  return ['hari_ini', 'beban', 'history', 'statistik', 'kendala'];
}

// ============================================================
//  TAB DISPATCHER
// ============================================================
function showTab(tab, btn){
  state.currentTab = tab;
  state.detailCtx = null;
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  else {
    const b = document.querySelector(`.nav-tab[data-tab="${tab}"]`);
    if (b) b.classList.add('active');
  }
  loadTab(tab);
}

async function loadTab(tab, force){
  $('#main-content').innerHTML = '<div class="loading"><span class="spinner"></span>Memuat data…</div>';
  try {
    if      (tab === 'hari_ini')     await loadHariIni(force);
    else if (tab === 'logbook_saya') await loadLogbookSaya(force);
    else if (tab === 'beban')        await loadBeban(force);
    else if (tab === 'history')      await loadHistory(force);
    else if (tab === 'statistik')    await loadStatistik(force);
    else if (tab === 'kendala')      await loadKendala(force);
  } catch (e) {
    $('#main-content').innerHTML = `<div class="alert alert-warn">Gagal memuat data: ${escHtml(e.message || e)}</div>`;
  }
}

function renderHariIni(data){
  if (!data || !data.personil) { $('#main-content').innerHTML = '<div class="alert alert-warn">Tidak ada data.</div>'; return; }
  const u = state.user;
  const role = (u.role || '').toLowerCase();

  // STAF: hanya lihat dirinya
  let personilTampil = data.personil;
  if (role === 'staf') {
    personilTampil = data.personil.filter(p => (p.kode === u.kode) || p.nama === u.nama);
  }
  // KABAG: semua + ada highlight bagian sendiri (kabiro: semua)

  const total       = personilTampil.length;
  const submit      = personilTampil.filter(p => p.sudahSubmit).length;
  const terlambat   = personilTampil.filter(p => p.terlambat).length;
  const tepatWaktu  = submit - terlambat;
  const belum       = total - submit;
  const pct         = total ? Math.round(submit / total * 100) : 0;

  const dirinya     = data.personil.find(p => p.kode === u.kode);
  const dirinyaBelum= dirinya && !dirinya.sudahSubmit;

  html += `

    <div class="card" style="--card-accent:var(--hijau-br);">

      <div class="card-sub">${role === 'staf' ? (dirinya && dirinya.jamSubmit ? 'Pukul ' + dirinya.jamSubmit : 'Segera diisi') : pct + '% kepatuhan tim'}</div>
    </div>

    </div>
    <div class="card" style="--card-accent:var(--kuning);">
      <div class="card-label">Terlambat</div>
      <div class="card-val">${terlambat}</div>
      <div class="card-sub">Submit ≥ 15.30 WIB</div>
    </div>
    <div class="card" style="--card-accent:var(--merah);">
      <div class="card-label">Belum Submit</div>
      <div class="card-val">${belum}</div>
      <div class="card-sub">${belum ? 'Perlu pengingat' : 'Semua sudah submit'}</div>
    </div>
  </div>`;

  html += `
  <div class="panel">
    <div class="panel-head">
      <div>
        <div class="panel-title">Status Personil — ${escHtml(tglPanjang(data.tanggal))}</div>
        <div class="panel-sub">${role === 'staf' ? 'Status logbook pribadi' : 'Klik baris untuk lihat detail isi logbook'}</div>
      </div>
      <div style="display:flex; gap:8px;">

        <button class="btn btn-outline" onclick="loadTab('hari_ini', true)">↻ Refresh</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Personil</th><th>Bagian</th><th>Status</th><th>Jam Submit</th><th></th>
        </tr></thead>
        <tbody>`;

  personilTampil.forEach(p => {

    html += `
      <tr class="row-click" onclick="showDetail('${escHtml(p.nama)}','${data.tanggal}','hari_ini')">

}

function renderDonut(distribusi, total){
  if (!total) return '<div style="text-align:center; color:var(--teks-sub); font-size:12px;">Belum ada kegiatan</div>';
  let acc = 0;
  const stops = KATEGORI.map(k => {
    const v = distribusi[k] || 0;
    const start = acc / total * 360;
    acc += v;
    const end = acc / total * 360;
    return `${KAT_COLOR[k]} ${start}deg ${end}deg`;
  }).join(', ');
  return `<div class="donut" style="background:conic-gradient(${stops});">
    <div class="donut-label"><div class="donut-val">${total}</div><div class="donut-cap">Kegiatan</div></div>
  </div>`;
}

// ============================================================
//  TAB: HISTORY
// ============================================================
async function loadHistory(force){
  const f = state.filter;
  const params = { start:f.start, end:f.end, bagian:f.bagian, q:f.q };
  const key = 'history_' + JSON.stringify(params);
  if (force || !state.cache[key]) state.cache[key] = await fetchApi('history', params);
  renderHistory(state.cache[key]);
}

function renderHistory(data){
  const rows = (data && data.data) || [];
  let html = renderToolbarRange('history', /*withSearch*/true, /*withBagian*/true);

  html += `
  <div class="panel">
    <div class="panel-head">
      <div>
        <div class="panel-title">History Submit</div>
        <div class="panel-sub">${rows.length} baris pada filter saat ini</div>
      </div>
      <button class="btn btn-outline" onclick="exportCsv('history')">↓ Export CSV</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Tanggal</th><th>Personil</th><th>Bagian</th><th>Status</th><th>Jam</th><th></th></tr></thead>
      <tbody>`;
  if (!rows.length) {
    html += `<tr><td colspan="6" class="empty">Tidak ada data pada filter ini.</td></tr>`;
  } else {
    rows.sort((a,b) => b.tanggal.localeCompare(a.tanggal) || a.nama.localeCompare(b.nama));
    rows.forEach(r => {
      html += `
      <tr class="row-click" onclick="showDetail('${escHtml(r.nama)}','${r.tanggal}','history')">
        <td>${escHtml(tglPendek(r.tanggal))}</td>
        <td><div class="nama-cell">
          <div class="av ${avClass(r.jabatan)}">${inisial(r.nama)}</div>
          <div><div class="nm">${escHtml(r.nama.split(',')[0])}</div><div class="jb">${escHtml(r.jabatan)}</div></div>
        </div></td>
        <td>${escHtml(r.bagian)}</td>
        <td>${badgeStatus(r.status)}</td>
        <td>${escHtml(r.jamSubmit)}</td>
        <td><span class="btn btn-ghost">Detail →</span></td>

    });
  }
  html += `</tbody></table></div></div>`;
  $('#main-content').innerHTML = html;
}

// ============================================================
//  TAB: STATISTIK TIM
// ============================================================
async function loadStatistik(force){
  const f = state.filter;
  const key = 'statistik_' + f.start + '_' + f.end;
  if (force || !state.cache[key]) {
    state.cache[key] = {
      stat: await fetchApi('statistik', { start:f.start, end:f.end }),
      beban: await fetchApi('beban_kerja', { start:f.start, end:f.end }),
    };
  }
  renderStatistik(state.cache[key]);
}

function renderStatistik(data){
  const stats = (data && data.stat && data.stat.data) || [];
  const beban = (data && data.beban && data.beban.personil) || [];
  const bebanByNama = Object.fromEntries(beban.map(b => [b.nama, b]));

  let html = renderToolbarRange('statistik', false, true);

  if (!stats.length) {
    html += `<div class="alert alert-info">Belum ada data statistik pada periode ini.</div>`;
    $('#main-content').innerHTML = html;
    return;
  }

  // KABAG: filter ke bagian sendiri kalau tidak set bagian
  let tampil = stats;
  if (state.user.role === 'kabag' && !state.filter.bagian) {
    tampil = stats.filter(s => s.bagian === state.user.bagian);
  }

  html += `<div class="stat-grid">`;
  tampil.forEach(s => {
    const sukses = s.submit + s.terlambat;
    const pct = s.total ? Math.round(sukses / s.total * 100) : 0;
    const b = bebanByNama[s.nama] || {};
    const top1 = b.topKategori && b.topKategori[0];
    html += `
    <div class="stat-tile">
      <div class="stat-tile-head">
        <div class="av ${avClass(s.jabatan)}">${inisial(s.nama)}</div>
        <div>
          <div style="font-weight:700; color:var(--navy); line-height:1.2;">${escHtml(s.nama.split(',')[0])}</div>
          <div class="stat-tile-meta">${escHtml(s.jabatan)} · ${escHtml(s.bagian)}</div>
        </div>
      </div>
      <div class="stat-pct">
        <span>Kepatuhan</span><span class="stat-pct-val" style="color:${pct >= 90 ? 'var(--hijau)' : (pct >= 70 ? 'var(--kuning)' : 'var(--merah)')};">${pct}%</span>
      </div>
      <div class="progress" style="margin-bottom:14px;"><div class="progress-bar ${pctColor(pct)}" style="width:${pct}%;"></div></div>

      <div class="stat-tile-grid">
        <div><div class="stat-mini">Tepat</div><div class="stat-mini-val">${s.submit}</div></div>
        <div><div class="stat-mini">Terlambat</div><div class="stat-mini-val">${s.terlambat}</div></div>
        <div><div class="stat-mini">Tidak Submit</div><div class="stat-mini-val">${s.tidakSubmit}</div></div>
        <div><div class="stat-mini">Total Hari</div><div class="stat-mini-val">${s.total}</div></div>
        <div><div class="stat-mini">Jam Efektif</div><div class="stat-mini-val">${b.jamEfektif != null ? Math.round(b.jamEfektif*10)/10 : '—'}</div></div>
        <div><div class="stat-mini">FTE Util</div><div class="stat-mini-val">${b.fteUtil != null ? b.fteUtil + '%' : '—'}</div></div>
      </div>
      ${top1 ? `<div style="font-size:11px; color:var(--teks-sub);"><strong style="color:${KAT_COLOR[top1.kategori]};">Top kategori:</strong> ${escHtml(top1.kategori)} (${top1.n}x)</div>` : ''}
    </div>`;
  });
  html += `</div>`;

  $('#main-content').innerHTML = html;
}

//  TAB: KENDALA

async function loadKendala(force){
  const f = state.filter;
  const key = 'kendala_' + f.start + '_' + f.end;

function renderKendala(data){
  const items = (data && data.items) || [];
  const perP  = (data && data.perPersonil) || [];
  const perB  = (data && data.perBagian) || [];

  let html = renderToolbarRange('kendala', false, false);

  html += `
  <div class="cards cards-3">
    <div class="card" style="--card-accent:var(--merah);">
      <div class="card-label">Total Kendala</div>
      <div class="card-val">${items.length}</div>
      <div class="card-sub">tercatat pada periode</div>
    </div>
    <div class="card" style="--card-accent:var(--kuning);">
      <div class="card-label">Personil Terdampak</div>
      <div class="card-val">${perP.length}</div>
      <div class="card-sub">orang menyampaikan kendala</div>
    </div>
    <div class="card" style="--card-accent:var(--ungu);">
      <div class="card-label">Bagian Terdampak</div>
      <div class="card-val">${perB.length}</div>
      <div class="card-sub">unit kerja</div>
    </div>
  </div>`;

  if (perP.length) {
    html += `<div class="panel">
      <div class="panel-head"><div><div class="panel-title">Top Personil — Kendala Terbanyak</div>
        <div class="panel-sub">Indikator awal beban berlebih atau hambatan operasional</div></div></div>
      <div class="table-wrap"><table>
        <thead><tr><th>Personil</th><th>Jumlah Kendala</th><th>Visualisasi</th></tr></thead>
        <tbody>`;
    const max = perP[0].n;
    perP.forEach(p => {
      const w = max ? Math.round(p.n/max*100) : 0;
      html += `<tr>
        <td>${escHtml(p.nama.split(',')[0])}</td>
        <td><strong>${p.n}</strong></td>
        <td><div class="progress"><div class="progress-bar pb-warn" style="width:${w}%;"></div></div></td>
      </tr>`;
    });
    html += `</tbody></table></div></div>`;
  }

  html += `<div class="panel">
    <div class="panel-head">
      <div><div class="panel-title">Daftar Kendala</div>
        <div class="panel-sub">${items.length} entri · diurutkan terbaru</div></div>
      <button class="btn btn-outline" onclick="exportCsv('kendala')">↓ Export CSV</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Tanggal</th><th>Personil</th><th>Bagian</th><th>Kendala</th></tr></thead>
      <tbody>`;
  if (!items.length) {
    html += `<tr><td colspan="4" class="empty">Tidak ada kendala tercatat pada periode ini.</td></tr>`;
  } else {
    items.forEach(it => {
      html += `<tr>
        <td>${escHtml(tglPendek(it.tanggal))}</td>
        <td>${escHtml(it.nama.split(',')[0])}</td>
        <td>${escHtml(it.bagian)}</td>
        <td style="white-space:pre-wrap;">${escHtml(it.kendala)}</td>
      </tr>`;
    });
  }
  html += `</tbody></table></div></div>`;
  $('#main-content').innerHTML = html;
}

// ============================================================
//  TOOLBAR (range tanggal + filter)
// ============================================================
function renderToolbarRange(currentTab, withSearch, withBagian){
  const f = state.filter;
  const role = state.user.role;
  return `
  <div class="toolbar">
    <label>Periode</label>
    <input type="date" id="f-start" value="${f.start}" onchange="state.filter.start=this.value; loadTab('${currentTab}', true);">
    <span style="color:var(--teks-sub);">→</span>
    <input type="date" id="f-end"   value="${f.end}"   onchange="state.filter.end=this.value;   loadTab('${currentTab}', true);">

    <button class="btn btn-ghost" onclick="setRangePreset('bulan_ini', '${currentTab}')">Bulan ini</button>
    <button class="btn btn-ghost" onclick="setRangePreset('30_hari', '${currentTab}')">30 hari</button>
    <button class="btn btn-ghost" onclick="setRangePreset('minggu_ini', '${currentTab}')">Minggu ini</button>

    ${withBagian && role !== 'staf' ? `
    <label style="margin-left:14px;">Bagian</label>
    <select onchange="state.filter.bagian=this.value; loadTab('${currentTab}', true);">
      <option value=""${f.bagian===''?' selected':''}>Semua</option>
      <option value="Perencanaan"${f.bagian==='Perencanaan'?' selected':''}>Perencanaan</option>
      <option value="Data"${f.bagian==='Data'?' selected':''}>Data</option>
      <option value="Perencanaan dan Data"${f.bagian==='Perencanaan dan Data'?' selected':''}>Perencanaan dan Data (Kabiro)</option>
    </select>` : ''}

    ${withSearch ? `
    <input type="search" placeholder="Cari nama…" value="${escHtml(f.q)}"
      oninput="state.filter.q=this.value;" onchange="loadTab('${currentTab}', true);">` : ''}

    <div class="spacer"></div>
    <button class="btn btn-outline" onclick="loadTab('${currentTab}', true)">↻ Refresh</button>
    <button class="btn btn-ghost" onclick="window.print()" title="Cetak / Simpan PDF">🖨 Cetak</button>
  </div>`;
}

function setRangePreset(preset, tab){
  const today = new Date();
  let s, e = ymdHariIni();
  if (preset === 'bulan_ini') s = ymdAwalBulan();
  else if (preset === '30_hari') {
    const d = new Date(); d.setDate(d.getDate() - 29);
    s = d.toISOString().slice(0,10);
  } else if (preset === 'minggu_ini') {
    const d = new Date(); const wd = (d.getDay() + 6) % 7; // Senin = 0
    d.setDate(d.getDate() - wd);
    s = d.toISOString().slice(0,10);
  }
  state.filter.start = s; state.filter.end = e;
  loadTab(tab, true);
}

// ============================================================
//  DETAIL VIEW
// ============================================================
async function showDetail(nama, tgl, fromTab){
  state.detailCtx = { nama, tgl, fromTab };
  $('#main-content').innerHTML = '<div class="loading"><span class="spinner"></span>Memuat detail…</div>';
  try {
    const res = await fetchApi('detail', { nama, tgl });
    renderDetail(res.data, nama, tgl);
  } catch (e) {
    $('#main-content').innerHTML = `<div class="alert alert-warn">Gagal memuat detail: ${escHtml(e.message)}</div>`;
  }
}

function backFromDetail(){
  if (!state.detailCtx) { showTab('hari_ini'); return; }
  const tab = state.detailCtx.fromTab || 'hari_ini';
  state.detailCtx = null;
  showTab(tab);
}

function renderDetail(detail, nama, tgl){
  if (!detail) {
    $('#main-content').innerHTML = `
      <div class="panel">
        <div class="detail-back" onclick="backFromDetail()">← Kembali</div>
        <div class="alert alert-info">Tidak ada logbook untuk ${escHtml(nama)} pada tanggal ${escHtml(tglPanjang(tgl))}.</div>
      </div>`;
    return;
  }
  const role = String(detail._sheet||'').toLowerCase().includes('kabiro') ? 'kabiro'
             : String(detail._sheet||'').toLowerCase().includes('kabag')  ? 'kabag' : 'staf';

  // Kelompokkan field per seksi
  const sections = [
    { title: 'Info Dasar', keys: ['Tanggal','Nama Lengkap','Email Institusi','Bagian','Status Kehadiran','Jam Mulai Kerja','Jam Selesai Kerja'] },
    { title: 'Kegiatan 1', keys: ['Kegiatan 1 — Uraian','Kegiatan 1 — Jenis Tugas','Kegiatan 1 — Kategori','Kegiatan 1 — Output / Hasil','Kegiatan 1 — Hasil / Output'] },
    { title: 'Kegiatan 2', keys: ['Kegiatan 2 — Uraian','Kegiatan 2 — Jenis Tugas','Kegiatan 2 — Kategori','Kegiatan 2 — Output / Hasil','Kegiatan 2 — Hasil / Output'] },
    { title: 'Kegiatan 3', keys: ['Kegiatan 3 — Uraian','Kegiatan 3 — Jenis Tugas','Kegiatan 3 — Kategori','Kegiatan 3 — Output / Hasil','Kegiatan 3 — Hasil / Output'] },
    { title: 'Kendala & Tindak Lanjut', keys: ['Kendala yang Dihadapi','Solusi / Tindakan yang Diambil','Isu atau Kendala Mendesak di Unit','Keputusan Penting yang Diambil Hari Ini','Tindak Lanjut yang Diperlukan','Arahan untuk Kepala Bagian','Catatan / Arahan untuk Tim','Arahan Khusus untuk Esok Hari'] },
    { title: 'Monitoring Tim', keys: ['Jumlah staf yang sudah submit logbook hari ini','Nama staf yang BELUM submit (jika ada)','Submit rate tim hari ini'] },
    { title: 'Rencana & Catatan', keys: ['Rencana Kerja Besok','Catatan Tambahan','Catatan untuk Evaluasi'] },
  ];

  let html = `
  <div class="panel">
    <div class="detail-back" onclick="backFromDetail()">← Kembali</div>
    <div class="detail-head">
      <div class="av ${avClass(role)}" style="width:48px; height:48px; font-size:14px;">${inisial(nama)}</div>
      <div>
        <div style="font-size:16px; font-weight:700; color:var(--navy);">${escHtml(nama)}</div>
        <div style="font-size:12px; color:var(--teks-sub);">${escHtml(tglPanjang(tgl))} · ${escHtml(detail._sheet || '')}</div>
      </div>
    </div>`;

  const usedKeys = new Set();
  sections.forEach(sec => {
    const items = sec.keys.map(k => detail[k] != null && detail[k] !== '' ? { k, v:detail[k] } : null).filter(Boolean);
    if (!items.length) return;
    items.forEach(it => usedKeys.add(it.k));
    html += `<div style="margin-top:18px;">
      <div style="font-size:12px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:.6px; margin-bottom:10px;">${escHtml(sec.title)}</div>
      <div class="detail-grid">
        ${items.map(it => {
          const long = String(it.v).length > 50;
          return `<div class="detail-item${long?' full':''}">
            <div class="lbl">${escHtml(it.k)}</div>
            <div class="val">${escHtml(it.v)}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  });

  // Field lain yang belum termasuk
  const sisa = Object.entries(detail).filter(([k,v]) => k !== '_sheet' && k.toLowerCase() !== 'timestamp' && !usedKeys.has(k) && v !== '' && v != null);
  if (sisa.length) {
    html += `<div style="margin-top:18px;">
      <div style="font-size:12px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:.6px; margin-bottom:10px;">Field Lain</div>
      <div class="detail-grid">
        ${sisa.map(([k,v]) => {
          const long = String(v).length > 50;
          return `<div class="detail-item${long?' full':''}">
            <div class="lbl">${escHtml(k)}</div><div class="val">${escHtml(v)}</div></div>`;
        }).join('')}
      </div></div>`;
  }
  html += `</div>`;
  $('#main-content').innerHTML = html;
}

// ============================================================
//  EXPORT CSV
// ============================================================
function exportCsv(tab){
  let rows = [], filename = 'logbook.csv';
  const f = state.filter;
  const period = `${f.start}_to_${f.end}`;
  if (tab === 'history' || tab === 'logbook_saya') {
    const data = (state.cache[Object.keys(state.cache).find(k => k.startsWith(tab+'_'))] || {}).data || [];
    rows = [['Tanggal','Nama','Bagian','Jabatan','Status','Jam Submit','Keterangan'],
      ...data.map(r => [r.tanggal, r.nama, r.bagian, r.jabatan, r.status, r.jamSubmit, r.ket])];
    filename = `${tab}_${period}.csv`;
  } else if (tab === 'beban') {
    const cacheKey = Object.keys(state.cache).find(k => k.startsWith('beban_'));
    const d = state.cache[cacheKey] || {};
    const headers = ['Nama','Bagian','Jabatan','Hari Submit','Jam Efektif','FTE Util %','Jumlah Kegiatan','Jumlah Output','Jumlah Kendala', ...KATEGORI, 'Lain'];
    rows = [headers, ...(d.personil||[]).map(p => [
      p.nama, p.bagian, p.jabatan, p.hariSubmit, p.jamEfektif, p.fteUtil, p.jumlahKegiatan, p.jumlahOutput, p.jumlahKendala,
      ...KATEGORI.map(k => p.kategori[k] || 0), p.kategoriLain
    ])];
    filename = `beban_kerja_${period}.csv`;
  } else if (tab === 'kendala') {
    const cacheKey = Object.keys(state.cache).find(k => k.startsWith('kendala_'));
    const d = state.cache[cacheKey] || {};
    rows = [['Tanggal','Nama','Bagian','Jabatan','Kendala'],
      ...(d.items||[]).map(i => [i.tanggal, i.nama, i.bagian, i.jabatan, i.kendala])];
    filename = `kendala_${period}.csv`;
  }
  if (!rows.length) { alert('Tidak ada data untuk diekspor.'); return; }
  const csv = rows.map(r => r.map(cell => {
    const s = String(cell == null ? '' : cell);
    return /[",\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  }).join(',')).join('\n');
  // Tambah BOM agar Excel/Sheets buka dengan benar
  const blob = new Blob(['﻿' + csv], { type:'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}
